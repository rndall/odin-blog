info:
  name: Login
  type: http
  seq: 1

http:
  method: POST
  url: "{{baseUrl}}/login"
  auth: inherit

runtime:
  scripts:
    - type: after-response
      code: |-
        const token = res.body.token

        if (!token) return

        bru.setEnvVar("token", token)

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
