info:
  name: Login (Author)
  type: http
  seq: 1

http:
  method: POST
  url: "{{baseUrl}}/login"
  body:
    type: json
    data: |-
      {
        "username": "author",
        "password": "password"
      }
  auth: inherit

runtime:
  scripts:
    - type: after-response
      code: |-
        const token = res.body.token

        if (!token) return

        bru.setEnvVar("token", token)

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
