opencollection: 1.0.0

info:
  name: odin-blog
config:
  proxy:
    inherit: true
    config:
      protocol: http
      hostname: ""
      port: ""
      auth:
        username: ""
        password: ""
      bypassProxy: ""

request:
  variables:
    - name: postId
      value: "10"
  scripts:
    - type: before-request
      code: |-
        const token = bru.getVar("token")

        if (!token) return

        req.setHeader("Authorization", `Bearer ${token}`)
bundled: false
extensions:
  bruno:
    ignore:
      - node_modules
      - .git
